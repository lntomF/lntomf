<svg width="1920" height="520" viewBox="0 0 1920 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#03080B"/>
      <stop offset="0.46" stop-color="#07161B"/>
      <stop offset="1" stop-color="#020506"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34D399" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#34D399"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#17323A" stroke-width="1" opacity="0.7"/>
    </pattern>
    <style>
      .scan { animation: scan 5.8s linear infinite; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 2.2s ease-in-out infinite 0.7s; transform-origin: center; }
      .pulse3 { animation: pulse 2.2s ease-in-out infinite 1.4s; transform-origin: center; }
      .flow { stroke-dasharray: 80 260; animation: flow 4.6s linear infinite; }
      .flow2 { stroke-dasharray: 70 250; animation: flow 5.4s linear infinite reverse; }
      .blink { animation: blink 1.1s steps(2, start) infinite; }
      .float { animation: float 4.8s ease-in-out infinite; }
      @keyframes scan {
        0% { transform: translateX(-460px); opacity: 0; }
        12% { opacity: 1; }
        88% { opacity: 1; }
        100% { transform: translateX(1960px); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; r: 7; }
        50% { opacity: 1; r: 12; }
      }
      @keyframes flow {
        to { stroke-dashoffset: -680; }
      }
      @keyframes blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0.15; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </defs>

  <rect width="1920" height="520" fill="url(#bg)"/>
  <rect width="1920" height="520" fill="url(#grid)" opacity="0.45"/>
  <path d="M0 110H1920M0 410H1920" stroke="#00E5FF" stroke-opacity="0.11"/>
  <path d="M210 260H620M1300 260H1710" stroke="#00E5FF" stroke-opacity="0.22" stroke-width="2"/>
  <rect class="scan" x="0" y="0" width="420" height="520" fill="url(#sweep)" opacity="0.25"/>

  <g filter="url(#glow)">
    <path class="flow" d="M170 165C330 165 390 230 520 230C650 230 690 260 790 260" stroke="url(#data)" stroke-width="3" stroke-linecap="round"/>
    <path class="flow2" d="M1130 260C1230 260 1270 230 1400 230C1530 230 1590 165 1750 165" stroke="url(#data)" stroke-width="3" stroke-linecap="round"/>
    <path class="flow2" d="M170 355C360 355 460 304 650 304C730 304 755 285 790 285" stroke="#00E5FF" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
    <path class="flow" d="M1130 285C1165 285 1190 304 1270 304C1460 304 1560 355 1750 355" stroke="#00E5FF" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g font-family="Fira Code, Consolas, monospace" fill="#E8FBFF">
    <text x="490" y="246" text-anchor="end" font-size="28" letter-spacing="3">DON'T MEMORIZE.</text>
    <text x="1430" y="246" font-size="28" letter-spacing="3">UNDERSTAND.</text>
    <text x="960" y="94" text-anchor="middle" font-size="20" fill="#7DD3FC" letter-spacing="5">EMBEDDED SYSTEM KERNEL</text>
    <text x="960" y="444" text-anchor="middle" font-size="18" fill="#34D399" letter-spacing="4">ARM · RTOS · DRIVERS · PROTOCOLS</text>
    <text x="118" y="78" font-size="16" fill="#7DD3FC">SYS_BOOT &gt; ONLINE<tspan class="blink">_</tspan></text>
    <text x="1602" y="78" font-size="16" fill="#7DD3FC">CLOCK_SYNC &gt; LOCKED</text>
  </g>

  <g class="float" filter="url(#glow)">
    <g stroke="#DDFBFF" stroke-width="3">
      <path d="M840 200H1080V320H840V200Z" stroke-opacity="0.35"/>
      <path d="M900 200V320M960 200V320M1020 200V320M840 260H1080"/>
    </g>
    <circle class="pulse" cx="840" cy="200" r="7" fill="#E8FBFF"/>
    <circle class="pulse2" cx="960" cy="200" r="7" fill="#E8FBFF"/>
    <circle class="pulse3" cx="1080" cy="200" r="7" fill="#E8FBFF"/>
    <circle class="pulse2" cx="840" cy="260" r="7" fill="#E8FBFF"/>
    <circle class="pulse3" cx="960" cy="260" r="7" fill="#00E5FF"/>
    <circle class="pulse" cx="1080" cy="260" r="7" fill="#E8FBFF"/>
    <circle class="pulse3" cx="840" cy="320" r="7" fill="#E8FBFF"/>
    <circle class="pulse" cx="960" cy="320" r="7" fill="#E8FBFF"/>
    <circle class="pulse2" cx="1080" cy="320" r="7" fill="#E8FBFF"/>
  </g>

  <g filter="url(#glow)" stroke="#7DD3FC" stroke-width="3" opacity="0.75">
    <path d="M1480 182H1630V332H1480V182Z"/>
    <path d="M1518 148H1668V298H1518V148Z"/>
    <path d="M1480 182L1518 148M1630 182L1668 148M1630 332L1668 298M1480 332L1518 298"/>
    <path class="flow" d="M1480 182L1668 298M1518 148L1630 332M1480 332L1668 148M1480 257H1668M1555 148V332" stroke="#34D399"/>
    <circle class="pulse" cx="1480" cy="182" r="6" fill="#E8FBFF"/>
    <circle class="pulse2" cx="1668" cy="298" r="6" fill="#E8FBFF"/>
    <circle class="pulse3" cx="1555" cy="257" r="6" fill="#34D399"/>
  </g>

  <g filter="url(#glow)" stroke="#7DD3FC" stroke-width="3" opacity="0.72">
    <path d="M278 190H438M278 260H438M278 330H438M278 190V330M358 190V330M438 190V330"/>
    <circle class="pulse" cx="278" cy="190" r="7" fill="#E8FBFF"/>
    <circle class="pulse2" cx="358" cy="260" r="7" fill="#00E5FF"/>
    <circle class="pulse3" cx="438" cy="330" r="7" fill="#E8FBFF"/>
  </g>

  <path d="M0 0H1920V520H0V0Z" stroke="#00E5FF" stroke-opacity="0.16" stroke-width="3"/>
  <rect x="24" y="24" width="1872" height="472" rx="18" stroke="#E8FBFF" stroke-opacity="0.08"/>
</svg>
